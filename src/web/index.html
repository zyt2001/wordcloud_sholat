<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>研究主题对比时间轴</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <section class="panel timeline-panel" aria-labelledby="timeline-title">
        <div class="timeline-heading">
          <div>
            <p class="panel-kicker">Timeline</p>
            <h2 id="timeline-title">时间轴切换</h2>
          </div>
          <p class="timeline-note">选择分段后，两侧统计与词云会同步更新。</p>
        </div>
        <div id="timeline" class="timeline" role="tablist" aria-label="研究分段时间轴"></div>
      </section>

      <main class="layout-grid">
        <section class="panel entity-panel" aria-labelledby="academy-title">
          <div class="panel-heading">
            <p class="panel-kicker">Academy</p>
            <h2 id="academy-title">模拟学院用户</h2>
            <p id="academy-sample-note" class="sample-note" hidden></p>
          </div>
          <div class="stats-grid" id="academy-stats"></div>
          <div class="canvas-card">
              <div class="canvas-card-head">
               <h3>主题词云</h3>
              </div>
            <div
              id="academy-cloud"
              class="cloud-placeholder"
              data-cloud-panel="academy"
              aria-label="学院侧词云画布"
            ></div>
          </div>
          <div>
            <h3 class="list-title">当前阶段高频主题</h3>
            <ol id="academy-topics" class="topic-list"></ol>
          </div>
        </section>

        <section class="panel entity-panel" aria-labelledby="website-title">
          <div class="panel-heading">
            <p class="panel-kicker">Website</p>
            <h2 id="website-title">模拟网站用户</h2>
            <p id="website-sample-note" class="sample-note" hidden></p>
          </div>
          <div class="stats-grid" id="website-stats"></div>
          <div class="canvas-card">
              <div class="canvas-card-head">
               <h3>主题词云</h3>
              </div>
            <div
              id="website-cloud"
              class="cloud-placeholder"
              data-cloud-panel="website"
              aria-label="网站侧词云画布"
            ></div>
          </div>
          <div>
            <h3 class="list-title">当前阶段高频主题</h3>
            <ol id="website-topics" class="topic-list"></ol>
          </div>
        </section>
      </main>
    </div>

    <template id="stat-template">
      <article class="stat-card">
        <span class="stat-label"></span>
        <strong class="stat-value"></strong>
      </article>
    </template>

    <div id="cloud-tooltip" class="cloud-tooltip" role="status" aria-live="polite" hidden></div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
